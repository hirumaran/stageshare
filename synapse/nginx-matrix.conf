# Matrix homeserver — add this server block to your main Nginx config
server {
    listen 80;
    server_name matrix.skene.bsd405.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name matrix.skene.bsd405.org;

    ssl_certificate     /etc/letsencrypt/live/matrix.skene.bsd405.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.skene.bsd405.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Matrix Client-Server API
    location /_matrix {
        proxy_pass http://localhost:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50M;
        proxy_read_timeout 600;
    }

    # Synapse Admin API
    location /_synapse {
        proxy_pass http://localhost:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }
}
