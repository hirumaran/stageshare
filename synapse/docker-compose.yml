version: '3.8'

services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: stageshare-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    volumes:
      - ./data:/data
    ports:
      - "8008:8008"
    depends_on:
      synapse-db:
        condition: service_healthy
    networks:
      - stageshare-matrix

  synapse-db:
    image: postgres:16-alpine
    container_name: stageshare-synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD}
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stageshare-matrix

networks:
  stageshare-matrix:
    driver: bridge

volumes:
  synapse-db-data:
